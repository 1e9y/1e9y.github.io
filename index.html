<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="V K">
	<meta name="description" content="">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<meta property="og:type" content="website" />
	<title>V K</title>

	<style>
		html, body {
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
			font: 9pt/1 "Fira Code", "Fira Mono", Menlo, monospace;

			color: #fffafa;
			background-color: rgb(50, 54, 56);
		}

		p {
			margin: 0.75em;
		}

		.icons {
			display: none;
		}

		.hero {
			display: flex;
			justify-content: center;
			width: 100%;
			height: 100%;
			box-sizing: border-box;
			overflow: hidden;
			background-color: transparent;
		}

		.hero section {
			margin-top: 1em;
		}

		.hero section header {
			counter-reset: line;
		}

		.hero section p::before {
			padding-right: 1em;
			font-size: 78%;
			vertical-align: top;
			counter-increment: line;
			/* content: counter(line); */
			color: hsl(230, 8%, 80%);
		}

	</style>
</head>

<body>
	<div class="hero">
		<section>
			<header>
				<p>hi, i'm benjamin</p>
			</header>
		</section>
	</div>
</body>

</html>
